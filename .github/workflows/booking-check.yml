name: Booking Check (Selenium + Telegram)

on:
  schedule:
    - cron: '11 9 * * *'
      timezone: 'Europe/Berlin'
    - cron: '11 16 * * *'
      timezone: 'Europe/Berlin'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run check
        run: python check.py

      # Debug (optional, aber hilft)
      - name: Debug - list files
        run: |
          ls -la
          ls -la screenshot.png || true
          ls -la AVAILABLE.txt || true

      # ✅ Screenshot IMMER hochladen (Artifacts sind genau für sowas gedacht) [4](https://www.geeksforgeeks.org/python/python-script-to-monitor-website-changes/)[5](https://github.com/actions/upload-artifact)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: booking-check-artifacts
          path: |
            screenshot.png
            AVAILABLE.txt
          if-no-files-found: warn
