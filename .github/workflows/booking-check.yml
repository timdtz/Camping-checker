name: Booking Check (Selenium)

on:
  schedule:
    - cron: "0 6 * * *"  # täglich 06:00 UTC (ca. 08:00 in DE, je nach DST)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      # GitHub empfiehlt das Forcen auf Node 24 zum Vorab-Test / Übergang. [3](https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        # setup-python hat eine Version, die den Wechsel auf node24 als Breaking Change nennt. [4](https://www.geeksforgeeks.org/python/python-script-to-monitor-website-changes/)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run check
        run: python check.py

      # Optional: Wenn AVAILABLE.txt existiert, lade Screenshot/Marker als Artifact hoch
      # (Artefakte sind praktisch, um den Treffer zu verifizieren.)
      - name: Upload evidence (if available)
        if: ${{ hashFiles('AVAILABLE.txt') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: booking-availability-evidence
          path: |
            AVAILABLE.txt
            screenshot-*.png
          if-no-files-found: warn
